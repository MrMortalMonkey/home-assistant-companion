name: Home Assistant AI Companion
version: "0.2.7"
slug: assistant
description: "Your home's AI guardian — autonomous agent that monitors, learns, and optimizes your energy via Home Assistant and your selected AI provider"
url: https://github.com/MrMortalMonkey/home-assistant-companion
arch:
  - aarch64
  - amd64
homeassistant_api: true
hassio_api: true
ingress: false
panel_icon: mdi:robot
panel_title: Home Assistant AI Companion
options:
  # ── Required ──────────────────────────────────────────────────────
  telegram_token: ""
  llm_provider: "anthropic"
  # ── AI provider credentials (fill only the one you use) ───────────
  anthropic_api_key: ""
  openai_api_key: ""
  openai_base_url: "https://api.openai.com/v1"
  openai_organization_id: ""
  openai_project_id: ""
  openrouter_api_key: ""
  ollama_host: "http://localhost:11434"
  lmstudio_host: "http://localhost:1234"
  # ── Optional model overrides ──────────────────────────────────────
  llm_model: ""
  llm_model_strong: ""
  # ── Startup security ──────────────────────────────────────────────
  sms_method: "ha_notify"
  # ── Features ──────────────────────────────────────────────────────
  enable_morning_briefing: true
  enable_evening_summary: true
  enable_appliance_detection: true
  # ── Regional settings ─────────────────────────────────────────────
  timezone: ""
  country_code: "us"
  electricity_rate_kwh: 0.15
  currency: "$"
  # ── HA Assist / Conversation API ──────────────────────────────────
  conversation_port: 8502
  conversation_secret: ""
  # ── Logging ───────────────────────────────────────────────────────
  log_level: "info"
schema:
  telegram_token: password
  llm_provider: list(anthropic|openai|openrouter|ollama|lmstudio)
  anthropic_api_key: password?
  openai_api_key: password?
  openai_base_url: str?
  openai_organization_id: str?
  openai_project_id: str?
  openrouter_api_key: password?
  ollama_host: str?
  lmstudio_host: str?
  llm_model: str?
  llm_model_strong: str?
  sms_method: list(free_mobile|ha_notify|email)
  enable_morning_briefing: bool
  enable_evening_summary: bool
  enable_appliance_detection: bool
  timezone: str?
  country_code: list(us|gb|fr|au|de|none)?
  electricity_rate_kwh: float?
  currency: str?
  conversation_port: int?
  conversation_secret: password?
  log_level: list(debug|info|warning|error)?
ports:
  8502/tcp: 8502
map:
  - config:rw
  - ssl:ro
startup: application
boot: auto
init: false
