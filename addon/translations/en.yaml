configuration:
  telegram_token:
    name: Telegram Bot Token
    description: Create this with @BotFather in Telegram.
  llm_provider:
    name: LLM Provider
    description: Choose the AI provider this app should use.
  anthropic_api_key:
    name: Anthropic API Key
    description: Required only when LLM Provider is set to Anthropic.
  openai_api_key:
    name: OpenAI API Key
    description: Required only when LLM Provider is set to OpenAI. Use an API key for this server-side app.
  openai_base_url:
    name: OpenAI API Base URL
    description: Optional. Leave as https://api.openai.com/v1 unless you know you need a compatible endpoint.
  openai_organization_id:
    name: OpenAI Organization ID
    description: Optional. Only needed for accounts that require an organization header.
  openai_project_id:
    name: OpenAI Project ID
    description: Optional. Only needed when you want requests scoped to a specific OpenAI project.
  openrouter_api_key:
    name: OpenRouter API Key
    description: Required only when LLM Provider is set to OpenRouter.
  llm_model:
    name: AI Model
    description: Optional. Enter a model ID for the selected provider. For OpenRouter, use IDs like openai/gpt-4o-mini or anthropic/claude-3.5-haiku. For Ollama and LM Studio, use a locally installed model name.
  llm_model_strong:
    name: Strong AI Model
    description: Optional. Used for heavier tasks such as troubleshooting and auto-fix. Leave blank to use the provider default.
  ollama_host:
    name: Ollama Host
    description: Local Ollama endpoint. Used only when LLM Provider is set to Ollama.
  lmstudio_host:
    name: LM Studio Host
    description: Local LM Studio endpoint. Used only when LLM Provider is set to LM Studio.
  sms_method:
    name: SMS Method
    description: Where the startup unlock code should be sent.
  enable_deploy_server:
    name: Enable Remote Support Server
    description: Advanced beta support only. Leave off unless MrMortalMonkey asks you to enable remote signed patches.
